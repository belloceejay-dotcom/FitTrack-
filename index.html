<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FitTrack+ Prototype</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Login Screen -->
  <div id="login-screen" class="screen">
    <img src="FitLogo.jpg" alt="FitLogo" class="logo">
    <h1>FitTrack+</h1>

    <div class="input-group">
      <input type="text" id="username" placeholder=" ">
      <label for="username">Username</label>
    </div>
    <div class="input-group">
      <input type="password" id="password" placeholder=" ">
      <label for="password">Password</label>
    </div>
    <a href="#" class="forgot-link">Forgot password?</a>

    <button onclick="login()">LOGIN</button>

    <div class="divider"><span>Or Login Using</span></div>

    <div class="social-login">
      <button class="gmail-btn" title="Login with Gmail">
        <svg width="20" height="20" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
          <path fill="#EA4335" d="M24 5.457c4.07 0 7.48 1.404 10.26 3.707l-4.4 4.4C28.13 12.02 26.18 11.2 24 11.2c-4.76 0-8.8 3.2-10.24 7.52l-5.1-3.97C11.54 8.71 17.34 5.457 24 5.457z"/>
          <path fill="#34A853" d="M46.145 24.52c0-1.56-.14-3.06-.4-4.52H24v8.56h12.44c-.54 2.88-2.18 5.32-4.64 6.96l5.1 3.96c2.98-2.74 4.7-6.78 4.7-11.46-.01-.5-.01-.99-.01-1.5h4.545z"/>
          <path fill="#4A90D9" d="M24 46.543c5.94 0 10.92-1.96 14.56-5.34l-5.1-3.96c-1.96 1.32-4.46 2.1-9.46 2.1-7.26 0-13.42-4.9-15.62-11.5l-5.14 3.97C6.32 41.16 14.54 46.543 24 46.543z"/>
          <path fill="#FBBC05" d="M8.38 28.843c-.56-1.66-.88-3.44-.88-5.28s.32-3.62.88-5.28l-5.14-3.97A22.83 22.83 0 0 0 1.14 24c0 3.7.88 7.2 2.1 10.69l5.14-3.847z"/>
        </svg>
        Login with Gmail
      </button>
      <button class="fb-btn" title="Login with Facebook">
        <svg width="20" height="20" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path fill="#ffffff" d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.41c0-3.025 1.792-4.697 4.533-4.697 1.312 0 2.686.236 2.686.236v2.971h-1.513c-1.491 0-1.956.93-1.956 1.885v2.269h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z"/>
        </svg>
        Login with Facebook
      </button>
      <button class="twitter-btn" title="Login with X">
        <svg width="20" height="20" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path fill="#ffffff" d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.747l7.73-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
        </svg>
        Login with X
      </button>
    </div>

    <p class="signup-cta">Don't have an account? <a href="#" onclick="showSignup()">Sign Up</a></p>
  </div>

  <!-- Sign Up Screen -->
  <div id="signup-screen" class="screen hidden">
    <img src="FitLogo.jpg" alt="FitLogo" class="logo">
    <h1>FitTrack+</h1>

    <div class="input-group">
      <input type="text" id="fullname" placeholder=" ">
      <label for="fullname">Full Name</label>
    </div>
    <div class="input-group">
      <input type="text" id="signup-username" placeholder=" ">
      <label for="signup-username">Username</label>
    </div>
    <div class="input-group">
      <input type="email" id="signup-email" placeholder=" ">
      <label for="signup-email">Email Address</label>
    </div>
    <div class="input-group">
      <input type="text" id="signup-mobile" placeholder=" ">
      <label for="signup-mobile">Mobile Number</label>
    </div>
    <div class="input-group">
      <input type="password" id="signup-password" placeholder=" ">
      <label for="signup-password">Password</label>
    </div>
    <div class="input-group">
      <input type="password" id="signup-confirm" placeholder=" ">
      <label for="signup-confirm">Confirm Password</label>
    </div>

    <button onclick="signup()">SIGN UP</button>
    <p class="signup-cta">Already have an account? <a href="#" onclick="showLogin()">Log In</a></p>
  </div>

  <!-- Dashboard -->
  <div id="dashboard" class="screen hidden">
    <h2>Dashboard</h2>
    <div class="card">Calories: <span id="calories">0</span> kcal</div>
    <div class="card">Workout: <span id="workout">None</span></div>
    <div class="card">Water Intake: <span id="water">0</span> L</div>
    <div class="card">Progress: <span id="progress">0%</span></div>

    <button onclick="showWorkout()">Log Workout</button>
    <button onclick="showMeal()">Log Meal</button>
    <button onclick="showWater()">Add Water</button>
  </div>

  <!-- Workout Logging -->
  <div id="workout-screen" class="screen hidden">
    <h2>Workout Logging</h2>
    <div class="input-group">
      <input type="text" id="workoutInput" placeholder=" ">
      <label for="workoutInput">e.g. 5km Run</label>
    </div>
    <button onclick="saveWorkout()">Save Workout</button>
    <button class="btn-ghost" onclick="backToDashboard()">Back</button>
  </div>

  <!-- Meal Logging -->
  <div id="meal-screen" class="screen hidden">
    <h2>Meal Tracking</h2>
    <div class="input-group">
      <input type="number" id="calorieInput" placeholder=" ">
      <label for="calorieInput">Calories (kcal)</label>
    </div>
    <button onclick="saveMeal()">Save Meal</button>
    <button class="btn-ghost" onclick="backToDashboard()">Back</button>
  </div>

  <!-- Water Tracking -->
  <div id="water-screen" class="screen hidden">
    <h2>Water Intake</h2>
    <div class="input-group">
      <input type="number" id="waterInput" placeholder=" ">
      <label for="waterInput">Liters (e.g. 0.5)</label>
    </div>
    <button onclick="saveWater()">Save</button>
    <button class="btn-ghost" onclick="backToDashboard()">Back</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
